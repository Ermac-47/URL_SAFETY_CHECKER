<!-- dashboard.html -->


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Safety Checker</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.result-card {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.safe { background: #14532d; }
.suspicious { background: #78350f; }
.phishing { background: #7f1d1d; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #1e293b;
    margin: 3% auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
    max-height: 80vh;
    overflow-y: auto;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

/* REPORT UI */
.report-section {
    margin-top: 20px;
}

.report-title {
    background: #14b8a6;
    padding: 10px;
    border-radius: 6px;
    font-weight: bold;
}

.report-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    background: #1e293b;
    border-radius: 8px;
    overflow: hidden;
}

.report-table td {
    padding: 12px;
    border-bottom: 1px solid #334155;
}

.report-table td:first-child {
    color: #94a3b8;
    width: 40%;
}

.badge {
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
}

.safe-badge { background: #16a34a; }
.suspicious-badge { background: orange; }
.phishing-badge { background: red; }

</style>
</head>

<body>

<div class="container">
    <h1>🔐 URL Safety Checker</h1>

    <textarea id="urlInput" placeholder="Paste multiple URLs (one per line)"></textarea>
    <button onclick="checkURLs()">Scan URLs</button>

    <div id="results"></div>
</div>

<!-- REPORT MODAL -->
<div id="reportModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="reportContent"></div>
    </div>
</div>

<script>
let fullResults = [];

async function checkURLs() {
    const input = document.getElementById("urlInput").value;

    const urls = input.split("\n").map(u => u.trim()).filter(u => u);

    const res = await fetch("http://127.0.0.1:5000/check-batch", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ urls })
    });

    const data = await res.json();
    fullResults = data.results;

    const container = document.getElementById("results");
    container.innerHTML = "";

    fullResults.forEach((item, index) => {
        let cls = item.verdict.toLowerCase();

        const div = document.createElement("div");
        div.className = "result-card " + cls;

        div.innerHTML = `
            <b>${item.url}</b> → ${item.verdict}
            <button onclick="viewReport(${index})">View Report</button>
        `;

        container.appendChild(div);
    });
}

function viewReport(index) {
    const data = fullResults[index];

    let badgeClass = "safe-badge";
    if (data.verdict === "SUSPICIOUS") badgeClass = "suspicious-badge";
    if (data.verdict === "PHISHING") badgeClass = "phishing-badge";

    document.getElementById("reportContent").innerHTML = `
        
        <div class="report-section">
            <div class="report-title">Report Summary</div>

            <table class="report-table">
                <tr><td>Website Address</td><td>${data.url}</td></tr>
                <tr><td>Verdict</td><td><span class="badge ${badgeClass}">${data.verdict}</span></td></tr>
                <tr><td>Final Score</td><td>${data.final_score}</td></tr>
            </table>
        </div>

        <!-- 🔥 DOMAIN INFO (THIS IS WHAT YOU ASKED) -->
        <div class="report-section">
            <div class="report-title">Domain Information</div>

            <table class="report-table">
                <tr><td>Domain</td><td>${data.domain}</td></tr>
                <tr><td>IP Address</td><td>${data.ip_address}</td></tr>
                <tr><td>Domain Age (days)</td><td>${data.domain_age_days}</td></tr>
            </table>
        </div>

        <div class="report-section">
            <div class="report-title">Detection Overview</div>

            <table class="report-table">
                <tr><td>ML Score</td><td>${data.ml_score}</td></tr>
                <tr><td>Rule Score</td><td>${data.rule_score}</td></tr>
                <tr><td>LLM Score</td><td>${data.llm_score}</td></tr>
            </table>
        </div>

        <div class="report-section">
            <div class="report-title">Detected Issues</div>

            <table class="report-table">
                <tr>
                    <td colspan="2">
                        <ul style="margin:0; padding-left:20px;">
                            ${data.reasons.map(r => `<li>${r}</li>`).join("")}
                        </ul>
                    </td>
                </tr>
            </table>
        </div>

        <div class="report-section">
            <div class="report-title">AI Security Analysis</div>

            <table class="report-table">
                <tr>
                    <td colspan="2">${data.llm_explanation}</td>
                </tr>
            </table>
        </div>
    `;

    document.getElementById("reportModal").style.display = "block";
}

function closeModal() {
    document.getElementById("reportModal").style.display = "none";
}
</script>

</body>
</html>
