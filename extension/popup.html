<!DOCTYPE html>
<html>
<head>
    <title>URL Checker</title>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: Arial;
            text-align: center;
        }

        #verdict {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #score {
            margin-bottom: 10px;
        }

        #reason {
            font-size: 12px;
            color: #333;
        }

        button {
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="verdict">Checking...</div>
    <div id="score"></div>
    <div id="reason"></div>

    <button id="details">View Full Report</button>

    <script src="popup.js"></script>
</body>
</html>
